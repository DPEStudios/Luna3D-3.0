<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de borradores — Luna 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  :root{
    --navy:#0B1437; --navy-2:#101B40; --card:rgba(255,255,255,.045);
    --line:rgba(255,255,255,.12); --line-soft:rgba(255,255,255,.08);
    --star:#F5F6FB; --silver:#C4C9DE; --muted:#8A93B6; --violet:#B12CD9;
    --grad:linear-gradient(125deg,#E81F9D 0%,#B12CD9 55%,#8E2BE6 100%);
    --ok:#3DDC97; --warn:#F7B500; --bad:#F7707A;
  }
  body{background:#070C20;color:var(--star);font-family:"Manrope",sans-serif;margin:0;padding:0;}
  .wrap{max-width:1180px;margin:0 auto;padding:24px 20px 80px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
    position:sticky;top:0;background:#070C20;padding:14px 0;z-index:5;border-bottom:1px solid var(--line-soft);}
  h1{font-family:"Space Grotesk",sans-serif;font-weight:500;font-size:22px;margin:0;}
  .count{font-family:"Space Mono",monospace;font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
  .btn{font-family:"Space Grotesk",sans-serif;font-size:14px;color:var(--star);background:transparent;
    border:1px solid var(--line);border-radius:10px;padding:9px 16px;cursor:pointer;transition:.15s;}
  .btn:hover{border-color:var(--violet);}
  .btn.grad{background:var(--grad);border:0;font-weight:500;}
  .btn.grad:hover{filter:brightness(1.08);}
  .state{padding:60px 20px;text-align:center;color:var(--silver);}
  .state .big{font-family:"Space Grotesk",sans-serif;font-size:18px;color:var(--star);margin-bottom:8px;}
  .grid{display:flex;flex-direction:column;gap:22px;margin-top:22px;}
  .row{display:grid;grid-template-columns:300px 1fr;gap:22px;background:var(--card);
    border:1px solid var(--line);border-radius:16px;padding:18px;transition:opacity .3s,transform .3s;}
  .row.dec-listo{border-color:rgba(61,220,151,.5);}
  .row.dec-rechazado{border-color:rgba(247,112,122,.4);}
  .row.removing{opacity:0;transform:scale(.97);}
  @media(max-width:760px){.row{grid-template-columns:1fr;}}
  .pic{aspect-ratio:1/1;border-radius:12px;overflow:hidden;background:rgba(255,255,255,.07);
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:#6A7299;}
  .pic img{width:100%;height:100%;object-fit:cover;display:block;}
  .pic .ph{font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.12em;}
  .pchip-cat{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--violet);}
  label{display:block;font-family:"Manrope",sans-serif;font-size:12px;letter-spacing:.04em;
    text-transform:uppercase;color:var(--muted);margin:0 0 5px;}
  .fld{margin-bottom:13px;}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  input,select,textarea{width:100%;box-sizing:border-box;background:rgba(255,255,255,.06);
    border:1px solid var(--line);border-radius:9px;color:var(--star);font-size:14px;
    font-family:"Manrope",sans-serif;padding:9px 11px;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--violet);}
  select option{background:var(--navy);color:var(--star);}
  textarea{resize:vertical;min-height:74px;line-height:1.6;}
  .name input{font-family:"Space Grotesk",sans-serif;font-size:17px;font-weight:500;}
  .hint{font-size:11px;color:var(--muted);margin-top:4px;}
  .colors{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .color{display:inline-flex;align-items:center;gap:7px;padding:5px 9px 5px 11px;border-radius:999px;
    border:1px solid var(--line);font-size:13px;}
  .color .dot{width:12px;height:12px;border-radius:50%;border:1px solid rgba(255,255,255,.4);}
  .color .rm{cursor:pointer;color:var(--muted);font-weight:700;line-height:1;padding:0 2px;}
  .color .rm:hover{color:var(--bad);}
  .addc{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px;align-items:center;}
  .addc .mini{font-size:12px;padding:5px 10px;border-radius:8px;border:1px dashed var(--line);
    background:transparent;color:var(--silver);cursor:pointer;}
  .addc .mini:hover{border-color:var(--violet);color:var(--star);}
  .addc input{width:140px;}
  .intern{margin-top:6px;border-top:1px dashed var(--line-soft);padding-top:13px;}
  .intern summary{cursor:pointer;color:var(--muted);font-size:12px;letter-spacing:.04em;
    text-transform:uppercase;list-style:none;}
  .intern summary::-webkit-details-marker{display:none;}
  .three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;margin-top:12px;}
  .margen{margin-top:12px;font-family:"Space Grotesk",sans-serif;font-size:14px;color:var(--silver);}
  .margen b{color:var(--ok);font-size:18px;}
  .actions{display:flex;align-items:center;gap:14px;margin-top:16px;flex-wrap:wrap;}
  .saved{font-size:13px;color:var(--ok);opacity:0;transition:.2s;}
  .saved.show{opacity:1;}
  .decision-box{display:flex;align-items:center;gap:8px;margin-left:auto;}
  .decision-box label{margin:0;}
  .decision-box select{width:auto;font-family:"Space Grotesk",sans-serif;font-weight:500;}
  select.dec-pendiente{border-color:var(--warn);color:var(--warn);}
  select.dec-listo{border-color:var(--ok);color:var(--ok);}
  select.dec-rechazado{border-color:var(--bad);color:var(--bad);}
  .err{color:var(--bad);font-size:13px;}
  #toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:50;min-width:260px;max-width:90vw;text-align:center;padding:14px 22px;border-radius:12px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:500;opacity:0;pointer-events:none;transition:.25s;box-shadow:0 8px 30px rgba(0,0,0,.4);}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #toast.ok{background:#0F3D2E;color:#3DDC97;border:1px solid #1f6b50;}
  #toast.bad{background:#3D1518;color:#F7707A;border:1px solid #6b2a2f;}
</style>
</head>
<body>
<div id="toast" role="status" aria-live="polite"></div>
<datalist id="cats-list"></datalist>
<datalist id="subs-list"></datalist>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>Editor de borradores · Luna 3D</h1>
      <div class="count" id="count">Cargando…</div>
    </div>
    <button class="btn" onclick="cargar()">↻ Recargar</button>
  </div>
  <div id="app"><div class="state"><div class="big">Cargando borradores…</div></div></div>
</div>

<script>
const DECISIONES = [
  ['pendiente','Pendiente'],
  ['listo','Listo para lanzar'],
  ['rechazado','Rechazado'],
];
const SWATCH = {Blanco:'#FFFFFF',Negro:'#15171c',Gris:'#8A93B6',Arena:'#D9CBB2',
  Azul:'#3A6EA5',Rojo:'#C0392B',Verde:'#27AE60',Amarillo:'#E1B12C',Naranjo:'#E67E22',
  Morado:'#8E44AD',Rosado:'#E84393',Celeste:'#74B9FF',Café:'#6E4B3A',Dorado:'#D4AF37',Plateado:'#BDC3C7'};
let ITEMS = [];

function clp(n){ n=Number(n); return isNaN(n)||n===0?'—':'$'+n.toLocaleString('es-CL'); }
function swatch(name){ const k=Object.keys(SWATCH).find(c=>c.toLowerCase()===String(name).toLowerCase()); return k?SWATCH[k]:'#888'; }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function catLabel(f){ return f.cat_nombre || f.cat || ''; }

async function cargar(){
  const app=document.getElementById('app');
  app.innerHTML='<div class="state"><div class="big">Cargando borradores…</div></div>';
  try{
    const r=await fetch('/api/borradores',{cache:'no-store'});
    const d=await r.json();
    ITEMS=(d.items||[]).map(f=>({...f, colors:Array.isArray(f.colors)?f.colors.slice():[], decision:f.decision||'pendiente'}));
    buildDatalists();
    render();
  }catch(e){
    app.innerHTML='<div class="state"><div class="big">No pude cargar</div>'+
      '¿Está corriendo el servidor? Ejecuta <code>python3 _editor/servidor.py</code>.<br><span class="err">'+esc(e)+'</span></div>';
  }
}

function buildDatalists(){
  const cats=[...new Set(ITEMS.map(catLabel).filter(Boolean))].sort();
  const subs=[...new Set(ITEMS.map(f=>f.subcat).filter(Boolean))].sort();
  document.getElementById('cats-list').innerHTML=cats.map(c=>`<option value="${esc(c)}">`).join('');
  document.getElementById('subs-list').innerHTML=subs.map(s=>`<option value="${esc(s)}">`).join('');
}

function render(){
  const app=document.getElementById('app');
  document.getElementById('count').textContent=ITEMS.length+' borrador(es)';
  if(!ITEMS.length){
    app.innerHTML='<div class="state"><div class="big">No hay borradores todavía</div>'+
      'Deja fotos en <code>_Futuros_Productos/</code> y dile a Claude “revisa las fotos”.</div>';
    return;
  }
  app.innerHTML='<div class="grid">'+ITEMS.map((f,i)=>card(f,i)).join('')+'</div>';
  ITEMS.forEach((f,i)=>{ renderColors(i); });
}

function card(f,i){
  const img=f._img?`<img src="${esc(f._img)}" alt="">`:`<i class="ti ti-photo" style="font-size:34px"></i><span class="ph">FOTO</span>`;
  const dec=f.decision||'pendiente';
  const decOpts=DECISIONES.map(d=>`<option value="${d[0]}" ${dec===d[0]?'selected':''}>${d[1]}</option>`).join('');
  const subTxt=f.subcat?(' › '+esc(f.subcat)):'';
  return `
  <div class="row dec-${dec}" data-i="${i}">
    <div>
      <div class="pic">${img}</div>
      <div style="margin-top:10px" class="pchip-cat" id="pchip-${i}">${esc(catLabel(f)||'—')}${subTxt}</div>
    </div>
    <div>
      <div class="fld name"><label>Nombre</label><input id="name-${i}" value="${esc(f.name)}"></div>
      <div class="two">
        <div class="fld">
          <label>Categoría</label>
          <input id="catn-${i}" value="${esc(catLabel(f))}" list="cats-list" placeholder="ej. Cultura pop" oninput="syncCat(${i})">
          <div class="hint">Elige una existente o escribe una nueva — se crea sola.</div>
        </div>
        <div class="fld">
          <label>Subcategoría</label>
          <input id="subcat-${i}" value="${esc(f.subcat)}" list="subs-list" placeholder="ej. Pokémon (opcional)" oninput="syncCat(${i})">
          <div class="hint">Opcional. Existente o nueva.</div>
        </div>
      </div>
      <div class="two">
        <div class="fld"><label>Precio (CLP)</label><input id="price-${i}" type="number" min="0" step="100" value="${f.price??''}" oninput="calc(${i})"></div>
        <div class="fld"><label>Dimensiones (alto × ancho × largo)</label><input id="dim-${i}" value="${esc(f.dimensiones)}" placeholder="ej. 15 × 14 × 14 cm"></div>
      </div>
      <div class="fld"><label>Descripción</label><textarea id="desc-${i}">${esc(f.desc)}</textarea></div>
      <div class="fld">
        <label>Colores</label>
        <div class="colors" id="colors-${i}"></div>
        <div class="addc">
          ${['Blanco','Negro','Gris'].map(c=>`<button class="mini" onclick="addColor(${i},'${c}')">+ ${c}</button>`).join('')}
          <input id="newcolor-${i}" placeholder="otro color" onkeydown="if(event.key==='Enter'){addColor(${i},this.value);this.value='';}">
          <button class="mini" onclick="const e=document.getElementById('newcolor-${i}');addColor(${i},e.value);e.value='';">+ agregar</button>
        </div>
      </div>
      <details class="intern">
        <summary>Datos internos (no se ven en la web)</summary>
        <div class="three">
          <div class="fld"><label>Costo (CLP)</label><input id="costo-${i}" type="number" min="0" step="100" value="${f.costo??''}" oninput="calc(${i})"></div>
          <div class="fld"><label>Filamento (g)</label><input id="gramos-${i}" type="number" min="0" value="${f.gramos??''}"></div>
          <div class="fld"><label>Impresión (min)</label><input id="tiempo-${i}" type="number" min="0" value="${f.tiempo_min??''}"></div>
        </div>
        <div class="margen" id="margen-${i}"></div>
      </details>
      <div class="actions">
        <button class="btn grad" onclick="guardar(${i})">Guardar cambios</button>
        <span class="saved" id="saved-${i}">✓ Guardado</span>
        <div class="decision-box">
          <label for="decision-${i}">Estado</label>
          <select id="decision-${i}" class="dec-${dec}" onchange="syncDecision(${i})">${decOpts}</select>
        </div>
      </div>
      <div class="hint" id="dechint-${i}"></div>
      <div class="err" id="err-${i}"></div>
    </div>
  </div>`;
}

function renderColors(i){
  const f=ITEMS[i], box=document.getElementById('colors-'+i);
  box.innerHTML=f.colors.length? f.colors.map((c,j)=>
    `<span class="color"><span class="dot" style="background:${swatch(c)}"></span>${esc(c)}<span class="rm" onclick="rmColor(${i},${j})">×</span></span>`
  ).join('') : '<span style="color:var(--muted);font-size:13px">sin colores</span>';
}
function addColor(i,name){ name=(name||'').trim(); if(!name)return;
  if(!ITEMS[i].colors.some(c=>c.toLowerCase()===name.toLowerCase())){
    ITEMS[i].colors.push(name.charAt(0).toUpperCase()+name.slice(1)); renderColors(i);} }
function rmColor(i,j){ ITEMS[i].colors.splice(j,1); renderColors(i); }

function syncCat(i){
  const cat=document.getElementById('catn-'+i).value.trim();
  const sub=document.getElementById('subcat-'+i).value.trim();
  document.getElementById('pchip-'+i).textContent=(cat||'—')+(sub?(' › '+sub):'');
}
function syncDecision(i){
  const sel=document.getElementById('decision-'+i);
  const val=sel.value;
  sel.className='dec-'+val;
  const row=document.querySelector(`.row[data-i="${i}"]`);
  if(row) row.className='row dec-'+val;
  const hint=document.getElementById('dechint-'+i);
  hint.textContent = val==='rechazado'
    ? 'Al guardar, este borrador se moverá a _Papelera.'
    : (val==='listo' ? 'Se publicará cuando subas los productos listos.' : '');
}
function calc(i){
  const p=Number(document.getElementById('price-'+i).value)||0;
  const c=Number(document.getElementById('costo-'+i).value)||0;
  const m=(p>0&&c>=0)?Math.round((p-c)/p*100):null;
  document.getElementById('margen-'+i).innerHTML = m!=null
    ? `Margen estimado: <b>${m}%</b> &nbsp;·&nbsp; utilidad ${clp(p-c)}`
    : 'Margen: — (falta precio o costo)';
}

async function guardar(i){
  const f=ITEMS[i];
  const decision=document.getElementById('decision-'+i).value;
  const payload={
    _ruta:f._ruta, id:f.id,
    name:document.getElementById('name-'+i).value.trim(),
    cat_nombre:document.getElementById('catn-'+i).value.trim(),
    subcat:document.getElementById('subcat-'+i).value.trim()||null,
    price:document.getElementById('price-'+i).value,
    dimensiones:document.getElementById('dim-'+i).value.trim()||null,
    desc:document.getElementById('desc-'+i).value.trim(),
    colors:f.colors,
    costo:document.getElementById('costo-'+i).value,
    gramos:document.getElementById('gramos-'+i).value,
    tiempo_min:document.getElementById('tiempo-'+i).value,
    decision:decision,
  };
  const err=document.getElementById('err-'+i); err.textContent='';
  if(!payload.cat_nombre){ err.textContent='Falta la categoría.'; toast('Falta la categoría', false); return; }
  try{
    const r=await fetch('/api/guardar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const d=await r.json();
    if(!d.ok){ err.textContent='Error: '+(d.error||'no se pudo guardar'); toast('No se pudo guardar: '+(d.error||''), false); return; }
    if(d.rechazado){
      const row=document.querySelector(`.row[data-i="${i}"]`);
      if(row){ row.classList.add('removing'); setTimeout(()=>{ cargar(); }, 320); }
      toast('Rechazado y movido a _Papelera — "'+(payload.name||'')+'"', true);
      return;
    }
    ITEMS[i]={...d.ficha, colors:Array.isArray(d.ficha.colors)?d.ficha.colors:[], _ruta:f._ruta, _img:f._img};
    const sv=document.getElementById('saved-'+i); sv.classList.add('show'); setTimeout(()=>sv.classList.remove('show'),2400);
    buildDatalists();
    toast('✓ Cambios guardados — "'+(ITEMS[i].name||'')+'" ['+decision+']', true);
  }catch(e){ err.textContent='Error de red: '+e; toast('Error de red al guardar', false); }
}

let _toastT=null;
function toast(msg,ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=(ok?'ok':'bad')+' show';
  clearTimeout(_toastT); _toastT=setTimeout(()=>t.classList.remove('show'),3200);
}

cargar();
</script>
</body>
</html>
